name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit && npx tsc --noEmit -p tsconfig.test.json

      - name: Test
        run: npm test

      - name: Dead-code check (knip — unused files/deps)
        run: npm run knip:ci

      - name: Build plugin
        run: npm run build
